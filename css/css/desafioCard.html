<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Desafio Card</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        div {
           display: inline-flex;
        }
        
        div .curso {
            width: 270px;
            height: 300px;
            margin: 20px;
            display: inline-block;
            border-radius: 4px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.4);
            font-family: verdana, sans-serif;
        }

        .curso img {
           margin: 4px;
           height: 144px;
           width: 258px; 
        }

        .curso-info {
            margin: 0px 5px;
            display: inline-block;
            max-height: 35%;
            overflow: hidden;
            font-size: 25px;
            height: 100px;
            padding: 5px;
        }
        
        .curso-info h4 {
            margin: 0px;
            font-weight: 500;
        }

        .curso-info p {
            font-size: 0.7em;
        }

        .curso-preco {
            float: right;
            font-size: 25px;
        }
        
        .preco-de {
            color: red;
            text-decoration: line-through;
            font-size: 0.7em;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 5px;
        }
        
        .preco-por {
            color: green;
            padding: 5px;
            font-weight: bolder;
        }
    </style>
</head>

<body>
    <h1>Card</h1>

    <h2>Objetivo</h2>
    <img src="http://files.cod3r.com.br/curso-web/card.png" height="340" alt="Objetivo">

    <h2>Resultado</h2>
    <div>
        <div class="curso">
            <img src="http://files.cod3r.com.br/curso-web/curso1.jpg" />
            <div class="curso-info">
                <h4>Docker: Ferramenta essencial para Desenvolvedores</h4>
                <p>Prof. Fulano</p>
            </div>
            <div class="curso-preco">
                <span class="preco-de">R$80,00</span>
                <span class="preco-por">R$50,00</span>
            </div>
        </div>
        <div class="curso">
            <img src="http://files.cod3r.com.br/curso-web/curso2.jpg" />
            <div class="curso-info">
                <h4>Web Moderno com Javascript + Projetos</h4>
                <p>Prof. Sicrano Filho</p>
            </div>
            <div class="curso-preco">
                <span class="preco-de">R$80,00</span>
                <span class="preco-por">R$50,00</span>
            </div>
        </div>
    </div>
</body>

</html>
