<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Desafio Menu</title>
    <link href="https://fonts.googleapis.com/css?family=Oswald" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0px;
        }

        .body {
            background: #D3D3D3;
        }
        
        .cabecalho {
            background-color: #333333;
            display: flex;
            height: 100px;
            align-items: center;

            border-bottom: none;
            box-shadow:
                0 1px 0 #002bff,
                0 2px 0 #006eff,
                0 3px 0 #00a2ff,
                0 4px 0 #6ecbff;

        }

        .logo {
            padding: 5px;
        }

        .logo a img {
            max-width: 400px;
            max-height: 90px;
            height: auto;
            width: auto;
        }

        .menu-toggle {
            display: none;
            margin-left: auto;
            margin-right: 20px;
            padding: 15px;
            color: white;
            background-color: gray;
            border-radius: 2px;
            border: solid gainsboro 1px;
        }

        .menu {
            display: inline-block;
        }

        .menu ul {
            display: flex;
            flex-direction: row;
            list-style: none;
            height: 100%;
        }
        
        .menu li a {
            display: inline-block;
            text-decoration: none;
            color: white;
            font-family: oswald;
            padding: 24px 10px;
            margin: 8px 0px;
            font-size: 24px;
            margin-right: 20px;
        }

        .menu li a:hover, .menu li a.selected {
            background: #00a2ff;
            color: black;
        }

        .autenticacao {
            margin-left: auto;
            padding: 28px 0;
            margin-right: 30px;
        }

        .autenticacao a {
            text-decoration: none;
            font-family: oswald;
            font-size: 24px;
            color: white;
            padding: 4px 10px;
            margin: 0px 10px;
        }

        .autenticacao .botao {
            border-radius: 10px;
            background-color: #CA2424;
        }

        @media (max-width: 1075px) {
            .autenticacao {display: none;}
        }

          @media (max-width: 825px) {
            .menu {display: none;}
            .menu-toggle {display: block;}
          }

    </style>
</head>

<body>
    <header class="cabecalho">
        <div class="logo">
            <a href="#inicio">
                <img src="http://files.cod3r.com.br/curso-web/logo.png" alt="Logo" />
            </a>
        </div>
        <button class="menu-toggle">
            <i class="fa fa-lg fa-bars"></i>
        </button>
        <nav class="menu">
            <ul>
                <li>
                    <a href="#inicio">Início</a>
                </li>
                <li>
                    <a href="#cursos">Cursos</a>
                </li>
                <li>
                    <a href="#sobre">Sobre</a>
                </li>
                <li>
                    <a href="#contato">Contato</a>
                </li>
            </ul>
        </nav>
        <aside class="autenticacao">
            <a href="#login">Login</a>
            <a href="#registar" class="botao destaque">Registrar</a>
        </aside>
    </header>

    <script>
        window.onhashchange = function(e) {
            const oldURL = e.oldURL.split('#') [1]
            const newURL = e.newURL.split('#') [1]
            console.log(oldURL, newURL)
            const oldMenu = document.querySelector(`.menu [href='#${oldURL}']`)
            const newMenu = document.querySelector(`.menu [href='#${newURL}']`)
            oldMenu && oldMenu.classList.remove('selected')
            newMenu && newMenu.classList.add('selected')
        }
    </script>
</body>

</html>
